<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KathReid TV - Hybrid Broadcast Engine</title>

<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TOP BAR */
  .top-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: space-between;
    padding: 12px;
    box-sizing: border-box;
  }

  .logo { font-weight: bold; }

  .live {
    background: red;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .tagline {
    font-size: 12px;
    opacity: 0.7;
    margin-top: -6px;
    text-align: center;
  }

  /* NOW AIRING */
  .now-airing {
    width: 100%;
    max-width: 900px;
    padding: 10px;
    background: rgba(255,0,0,0.08);
    border-bottom: 1px solid rgba(255,0,0,0.2);
    text-align: center;
    font-size: 13px;
    font-weight: bold;
  }

  /* PLAYER */
  #player {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16/9;
  }

  /* TV GUIDE */
  .tv-guide {
    width: 100%;
    max-width: 900px;
    margin-top: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
  }

  .guide-title {
    font-weight: bold;
    font-size: 13px;
    text-align: center;
    margin-bottom: 10px;
  }

  .guide-item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    opacity: 0.6;
  }

  .guide-item.active {
    background: rgba(255,0,0,0.15);
    border-left: 3px solid red;
    opacity: 1;
  }

  .guide-item.next {
    background: rgba(255,255,255,0.05);
    opacity: 0.9;
  }

</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">📺 KathReid TV</div>
  <div class="live">🔴 LIVE</div>
</div>

<div class="tagline">
  24/7 KathReid Network — Kathryn Bernardo & James Reid Moments, Music & Films
</div>

<div class="now-airing" id="nowAiring">Loading broadcast...</div>

<div id="player"></div>

<!-- TV GUIDE -->
<div class="tv-guide">
  <div class="guide-title">📺 TV GUIDE</div>
  <div id="guideContent"></div>
</div>

<script>
/* =========================
   📺 HYBRID TV SCHEDULE
========================= */

const schedule = [
  {
    block: "🌅 MORNING",
    slots: [
      { start: 360, end: 480, label: "6–8 AM James Songs", videos: ["t-v8rWA5Kuw"] },
      { start: 480, end: 600, label: "8–10 AM Kathryn Movies", videos: ["aqz-KE-bpKQ"] },
      { start: 600, end: 720, label: "10–12 AM KathReid Edits", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "☀️ AFTERNOON",
    slots: [
      { start: 720, end: 840, label: "12–2 PM Interviews", videos: ["aqz-KE-bpKQ"] },
      { start: 840, end: 960, label: "2–4 PM Updates", videos: ["t-v8rWA5Kuw"] },
      { start: 960, end: 1080, label: "4–6 PM James Movies", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "🌆 EVENING",
    slots: [
      { start: 1080, end: 1200, label: "6–8 PM Kilig Edits", videos: ["t-v8rWA5Kuw"] },
      { start: 1200, end: 1320, label: "8–10 PM Kathryn Movies", videos: ["aqz-KE-bpKQ"] },
      { start: 1320, end: 1380, label: "10–11 PM Interviews", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "🌙 LATE NIGHT",
    slots: [
      { start: 1380, end: 1440, label: "11–12 AM Comfort Loop", videos: ["t-v8rWA5Kuw"] }
    ]
  }
];

let player;
let playlist = [];
let index = 0;

/* 🇵🇭 Manila time */
function getMinutes() {
  const now = new Date();
  const m = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Manila"}));
  return m.getHours()*60 + m.getMinutes();
}

/* find active slot */
function getSlot() {
  const mins = getMinutes();
  for (const b of schedule) {
    for (const s of b.slots) {
      if (mins >= s.start && mins < s.end) {
        return { block: b.block, slot: s };
      }
    }
  }
}

/* shuffle */
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* build playlist */
function build(slot){
  playlist = shuffle([...slot.videos]);
  index = 0;
}

/* play next video */
function playNext(){
  const data = getSlot();
  const slot = data.slot;

  if(!playlist.length) build(slot);

  const vid = playlist[index];

  document.getElementById("nowAiring").innerText =
    `${data.block} • ${slot.label}`;

  player.loadVideoById(vid);

  index++;
  if(index >= playlist.length) build(slot);

  renderGuide();
}

/* TV GUIDE */
function getAllSlots(){
  let all = [];
  schedule.forEach(b=>{
    b.slots.forEach(s=>{
      all.push({block:b.block, ...s});
    });
  });
  return all.sort((a,b)=>a.start-b.start);
}

function renderGuide(){
  const slots = getAllSlots();
  const now = getMinutes();

  let html = "";

  slots.forEach(s=>{
    let cls = "guide-item";

    if(now >= s.start && now < s.end) cls = "guide-item active";
    else if(s.start > now) cls = "guide-item next";

    html += `
      <div class="${cls}">
        <span>${s.label}</span>
        <span>${formatTime(s.start)} - ${formatTime(s.end)}</span>
      </div>
    `;
  });

  document.getElementById("guideContent").innerHTML = html;
}

/* time format */
function formatTime(mins){
  let h = Math.floor(mins/60);
  let m = mins%60;
  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

/* YouTube API */
function onYouTubeIframeAPIReady(){
  player = new YT.Player("player", {
    videoId: "t-v8rWA5Kuw",
    playerVars:{ autoplay:1, controls:1, rel:0 },
    events:{
      onReady: ()=>{
        playNext();
        renderGuide();
        setInterval(renderGuide, 60000);
      },
      onStateChange: (e)=>{
        if(e.data === 0){
          playNext();
        }
      }
    }
  });
}

const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

</script>

</body>
</html>
