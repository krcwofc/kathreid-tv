<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KathReid TV - 24/7 Hybrid Broadcast</title>

<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .top-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: space-between;
    padding: 12px;
    box-sizing: border-box;
  }

  .logo { font-weight: bold; }

  .live {
    background: red;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .tagline {
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
    margin-top: -6px;
  }

  .now-airing {
    width: 100%;
    max-width: 900px;
    padding: 10px;
    background: rgba(255,0,0,0.08);
    border-bottom: 1px solid rgba(255,0,0,0.2);
    text-align: center;
    font-size: 13px;
    font-weight: bold;
  }

  #player {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16/9;
  }

  /* TV GUIDE */
  .tv-guide {
    width: 100%;
    max-width: 900px;
    margin-top: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px;
  }

  .guide-title {
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .guide-box {
    max-height: 260px;
    overflow-y: auto;
  }

  .guide-item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    font-size: 12px;
    opacity: 0.6;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .guide-item.active {
    background: rgba(255,0,0,0.15);
    border-left: 3px solid red;
    opacity: 1;
  }

  .guide-item.next {
    background: rgba(255,255,255,0.05);
    opacity: 0.9;
  }

  /* DISCORD */
  .discord-section {
    margin-top: 20px;
    width: 100%;
    max-width: 900px;
    text-align: center;
  }

  .discord-title {
    font-weight: bold;
    margin-bottom: 10px;
  }

  iframe {
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">📺 KathReid TV</div>
  <div class="live">🔴 LIVE</div>
</div>

<div class="tagline">
  24/7 KathReid Network — Kathryn Bernardo & James Reid Comfort Channel
</div>

<div class="now-airing" id="nowAiring">Loading broadcast...</div>

<div id="player"></div>

<!-- TV GUIDE -->
<div class="tv-guide">
  <div class="guide-title">📺 TV GUIDE</div>
  <div class="guide-box" id="guideContent"></div>
</div>

<!-- DISCORD -->
<div class="discord-section">
  <div class="discord-title">💬 ON AIR DISCUSSION</div>

  <iframe
    src="https://discord.com/widget?id=1510712484531666965&theme=dark"
    width="320"
    height="400"
    frameborder="0"
    sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
  </iframe>
</div>

<script>
/* =========================
   🎬 VIDEO ENGINE
========================= */

const COMMERCIAL = "t-v8rWA5Kuw";

const schedule = [
  {
    block: "🌅 MORNING",
    slots: [
      { start: 360, end: 480, label: "6–8 AM James Songs", videos: ["yMb6dyT0DIw", "6cI4RBSeYYw", "TsOfiwrj0Fg", "QS4bx41IC60", "QZhG3HCEUiI", "5ZZB9Gs8tQU", "HdI1_v5-690", "GQo2FerStNA", "MSHszha1nKI", "5ZZB9Gs8tQU", "Ai-yiy-m2gA", "GMYvUEly2vA", "XgyfXc3Y364", "l32MpMIJceY", "fORmM5og6YQ", "EAVD5iUmZac"] },
      { start: 480, end: 600, label: "8–10 AM Kathryn Movies", videos: ["aqz-KE-bpKQ"] },
      { start: 600, end: 720, label: "10–12 AM Edits", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "☀️ AFTERNOON",
    slots: [
      { start: 720, end: 840, label: "12–2 PM Interviews", videos: ["aqz-KE-bpKQ"] },
      { start: 840, end: 960, label: "2–4 PM Updates", videos: ["t-v8rWA5Kuw"] },
      { start: 960, end: 1080, label: "4–6 PM James Movies", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "🌆 EVENING",
    slots: [
      { start: 1080, end: 1200, label: "6–8 PM Kilig Edits", videos: ["t-v8rWA5Kuw"] },
      { start: 1200, end: 1320, label: "8–10 PM Kathryn Movies", videos: ["aqz-KE-bpKQ"] },
      { start: 1320, end: 1380, label: "10–11 PM Interviews", videos: ["kJQP7kiw5Fk"] }
    ]
  },
  {
    block: "🌙 LATE NIGHT",
    slots: [
      { start: 1380, end: 120, label: "12–2 AM Loop", videos: ["t-v8rWA5Kuw"] },
      { start: 120, end: 240, label: "2–4 AM Highlights", videos: ["aqz-KE-bpKQ"] },
      { start: 240, end: 360, label: "4–6 AM Reset", videos: ["kJQP7kiw5Fk"] }
    ]
  }
];

let player;
let playlist = [];
let index = 0;

/* TIME */
function getMinutes(){
  const now = new Date();
  const m = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Manila"}));
  return m.getHours()*60 + m.getMinutes();
}

function inSlot(now,start,end){
  if(start < end) return now >= start && now < end;
  return now >= start || now < end;
}

function getSlot(){
  const now = getMinutes();
  for(const b of schedule){
    for(const s of b.slots){
      if(inSlot(now,s.start,s.end)){
        return {block:b.block, slot:s};
      }
    }
  }
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function build(slot){
  playlist = shuffle([...slot.videos]);
  index = 0;
}

/* FALLBACK */
const fallbackVideos = [
  "t-v8rWA5Kuw",
  "aqz-KE-bpKQ",
  "kJQP7kiw5Fk"
];

function handleError(){
  index++;
  if(index >= playlist.length){
    build(getSlot().slot);
  }

  let vid = playlist[index] || fallbackVideos[Math.floor(Math.random()*fallbackVideos.length)];

  player.loadVideoById(vid);
  player.playVideo();
}

/* PLAY */
function playNext(){
  const data = getSlot();
  const slot = data.slot;

  if(!playlist.length) build(slot);

  const vid = playlist[index];

  document.getElementById("nowAiring").innerText =
    `${data.block} • ${slot.label}`;

  try {
    player.loadVideoById(vid);
    player.playVideo();
  } catch(e){
    handleError();
  }

  index++;

  if(index >= playlist.length) build(slot);

  renderGuide();
}

/* GUIDE */
function getAll(){
  let all=[];
  schedule.forEach(b=>{
    b.slots.forEach(s=>{
      all.push({block:b.block,...s});
    });
  });
  return all.sort((a,b)=>a.start-b.start);
}

function renderGuide(){
  const slots = getAll();
  const now = getMinutes();

  let html = "";

  slots.forEach(s=>{
    let cls = "guide-item";

    if(inSlot(now,s.start,s.end)) cls="guide-item active";
    else if(s.start > now) cls="guide-item next";

    html += `
      <div class="${cls}">
        <span>${s.label}</span>
        <span>${format(s.start)} - ${format(s.end)}</span>
      </div>
    `;
  });

  document.getElementById("guideContent").innerHTML = html;
}

function format(m){
  let h=Math.floor(m/60);
  let min=m%60;
  let ampm=h>=12?"PM":"AM";
  h=h%12||12;
  return `${h}:${String(min).padStart(2,'0')} ${ampm}`;
}

/* YOUTUBE */
function onYouTubeIframeAPIReady(){
  player = new YT.Player("player",{
    videoId:"t-v8rWA5Kuw",
    playerVars:{
      autoplay:1,
      controls:1,
      rel:0,
      mute:1
    },
    events:{
      onReady:()=>{
        player.mute();
        setTimeout(()=> playNext(), 500);
        renderGuide();
      },
      onStateChange:(e)=>{
        if(e.data === 0) playNext();
      },
      onError:()=>{
        handleError();
      }
    }
  });
}

const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);
</script>

</body>
</html>
