<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KathReid TV - 24/7 Channel</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .live {
      background: red;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .tagline {
      font-size: 12px;
      opacity: 0.6;
      margin-top: -6px;
      text-align: center;
    }

    /* TICKER */
    .ticker {
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      background: rgba(255, 0, 0, 0.08);
      border-top: 1px solid rgba(255, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
      margin-bottom: 10px;
    }

    .ticker-text {
      display: inline-block;
      white-space: nowrap;
      padding: 6px 0;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      animation: scroll 12s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* PLAYER */
    #player {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
    }

    .info {
      margin-top: 10px;
      text-align: center;
      opacity: 0.8;
    }

    /* DISCORD */
    .discord-section {
      margin-top: 20px;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .air-header {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    iframe {
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">📺 KathReid TV</div>
    <div class="live">🔴 LIVE</div>
  </div>

  <div class="tagline">Your 24/7 Kath & Reid comfort channel</div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-text">
      🔴 BREAKING • 🎬 NOW AIRING • KathReid TV LIVE BROADCAST • 🔴 BREAKING • 🎬 NOW AIRING •
    </div>
  </div>

  <!-- PLAYER -->
  <div id="player"></div>

  <div class="info" id="info">Loading KathReid TV...</div>

  <!-- DISCORD -->
  <div class="discord-section">
    <div class="air-header">🔴 ON AIR DISCUSSION</div>

    <iframe
      src="https://discord.com/widget?id=1510712484531666965&theme=dark"
      width="320"
      height="400"
      allowtransparency="true"
      frameborder="0"
      sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>
  </div>

  <script>
    const videos = [
      { id: "t-v8rWA5Kuw", title: "Test 1" },
      { id: "aqz-KE-bpKQ", title: "Test 2" },
      { id: "kJQP7kiw5Fk", title: "Test 3" }
    ];

    let index = 0;
    let player;

    function loadVideo(i) {
      const video = videos[i];
      document.getElementById("info").innerText =
        "Now Playing: " + video.title;

      player.loadVideoById(video.id);
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: videos[0].id,
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0
        },
        events: {
          onReady: () => {
            loadVideo(0);
          },
          onStateChange: (event) => {
            if (event.data === 0) {
              index = (index + 1) % videos.length;
              loadVideo(index);
            }
          }
        }
      });
    }

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
  </script>

</body>
</html>
