<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KathReid TV - 24/7 Broadcast</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
    }

    .live {
      background: red;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .tagline {
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
      margin-top: -6px;
    }

    /* NOW AIRING */
    .now-airing {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 0, 0, 0.08);
      border-top: 1px solid rgba(255, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    #player {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
    }

    /* DISCORD */
    .discord-section {
      margin-top: 20px;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .air-header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    iframe {
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">📺 KathReid TV</div>
    <div class="live">🔴 LIVE</div>
  </div>

  <div class="tagline">
    24/7 KathReid Network — Kathryn Bernardo & James Reid Moments, Music & Films
  </div>

  <!-- NOW AIRING -->
  <div class="now-airing" id="nowAiring">
    Loading broadcast schedule...
  </div>

  <!-- PLAYER -->
  <div id="player"></div>

  <!-- DISCORD -->
  <div class="discord-section">
    <div class="air-header">🔴 ON AIR DISCUSSION</div>

    <iframe
      src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"
      width="320"
      height="400"
      frameborder="0"
      sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>
  </div>

  <script>
    /* 📺 FULL SCHEDULE */
    const schedule = [
      {
        name: "🌅 MORNING BLOCK",
        timeText: "6:00 AM – 11:59 AM",
        start: 360,
        end: 719,
        videos: ["t-v8rWA5Kuw", "aqz-KE-bpKQ"]
      },
      {
        name: "☀️ AFTERNOON BLOCK",
        timeText: "12:00 PM – 5:59 PM",
        start: 720,
        end: 1079,
        videos: ["aqz-KE-bpKQ", "kJQP7kiw5Fk"]
      },
      {
        name: "🌆 EVENING BLOCK",
        timeText: "6:00 PM – 10:59 PM",
        start: 1080,
        end: 1319,
        videos: ["t-v8rWA5Kuw", "kJQP7kiw5Fk"]
      },
      {
        name: "🌙 LATE NIGHT BLOCK",
        timeText: "11:00 PM – 5:59 AM",
        start: 1320,
        end: 1439,
        videos: ["aqz-KE-bpKQ", "kJQP7kiw5Fk"]
      }
    ];

    let player;
    let currentPlaylist = [];
    let currentIndex = 0;

    function getManilaMinutes() {
      const now = new Date();
      const manila = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Manila" })
      );
      return manila.getHours() * 60 + manila.getMinutes();
    }

    function getCurrentBlock() {
      const minutes = getManilaMinutes();
      return schedule.find(s => minutes >= s.start && minutes < s.end);
    }

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function buildPlaylist(block) {
      currentPlaylist = shuffle([...block.videos]);
      currentIndex = 0;
    }

    function playNext() {
      const block = getCurrentBlock();

      if (!currentPlaylist.length) {
        buildPlaylist(block);
      }

      const videoId = currentPlaylist[currentIndex];

      document.getElementById("nowAiring").innerText =
        `${block.name} (${block.timeText})`;

      player.loadVideoById(videoId);

      currentIndex++;

      if (currentIndex >= currentPlaylist.length) {
        buildPlaylist(block);
      }
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: schedule[0].videos[0],
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0
        },
        events: {
          onReady: () => {
            playNext();
          },
          onStateChange: (event) => {
            if (event.data === 0) {
              playNext();
            }
          }
        }
      });
    }

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
  </script>

</body>
</html>
