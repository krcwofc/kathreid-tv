<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KathReid TV - 24/7 Broadcast</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .live {
      background: red;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* UPDATED TAGLINE (NETWORK STYLE) */
    .tagline {
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
      margin-top: -6px;
      letter-spacing: 0.5px;
    }

    /* NOW AIRING */
    .now-airing {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 0, 0, 0.08);
      border-top: 1px solid rgba(255, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      transition: opacity 0.6s ease;
    }

    /* PLAYER */
    #player {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.6s ease;
    }

    /* DISCORD */
    .discord-section {
      margin-top: 20px;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .air-header {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    iframe {
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">📺 KathReid TV</div>
    <div class="live">🔴 LIVE</div>
  </div>

  <!-- UPDATED NETWORK TAGLINE -->
  <div class="tagline">
    24/7 KathReid Network — Streaming Kathryn Bernardo & James Reid Moments, Music & Films
  </div>

  <!-- NOW AIRING -->
  <div class="now-airing" id="nowAiring">
    Loading broadcast schedule...
  </div>

  <!-- PLAYER -->
  <div id="player"></div>

  <!-- DISCORD -->
  <div class="discord-section">
    <div class="air-header">🔴 ON AIR DISCUSSION</div>

    <iframe
      src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"
      width="320"
      height="400"
      allowtransparency="true"
      frameborder="0"
      sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>
  </div>

  <script>
    // 📺 MANILA-BASED BROADCAST SCHEDULE
    const schedule = [
      {
        start: 0,
        end: 480,
        title: "Morning Kilig Moments (Edits & Soft Scenes)",
        videos: ["t-v8rWA5Kuw"]
      },
      {
        start: 480,
        end: 720,
        title: "Afternoon Interviews (Kathryn & James Features)",
        videos: ["aqz-KE-bpKQ"]
      },
      {
        start: 720,
        end: 1080,
        title: "Afternoon Films (Movies & Highlights)",
        videos: ["kJQP7kiw5Fk"]
      },
      {
        start: 1080,
        end: 1320,
        title: "Evening Kilig Peak (Emotional Moments & Edits)",
        videos: ["t-v8rWA5Kuw"]
      },
      {
        start: 1320,
        end: 1440,
        title: "Late Night Comfort Loop (Music & Replays)",
        videos: ["aqz-KE-bpKQ"]
      }
    ];

    let player;

    function getManilaMinutes() {
      const now = new Date();
      const manila = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Manila" })
      );
      return manila.getHours() * 60 + manila.getMinutes();
    }

    function getCurrentShow() {
      const minutes = getManilaMinutes();
      return schedule.find(s => minutes >= s.start && minutes < s.end);
    }

    function loadCurrentShow() {
      const show = getCurrentShow();

      document.getElementById("nowAiring").innerText =
        "🎬 NOW AIRING: " + show.title + " (Manila Time)";

      player.loadVideoById(show.videos[0]);
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: schedule[0].videos[0],
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0
        },
        events: {
          onReady: () => {
            loadCurrentShow();
            setInterval(loadCurrentShow, 60000);
          }
        }
      });
    }

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
  </script>

</body>
</html>
