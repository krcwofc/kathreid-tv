<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KathReid TV Lobby</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.glow{
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle, rgba(255,215,0,.2), transparent 60%);
filter:blur(70px);
z-index:0;
}

#particles{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
}

.particle{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.4;
border-radius:50%;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(110vh);opacity:0;}
10%{opacity:1;}
90%{opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

.container{
position:relative;
z-index:2;
max-width:800px;
padding:40px;
}

.logo{
width:200px;
margin-bottom:25px;
filter:drop-shadow(0 0 20px rgba(255,215,0,.5));
}

.label{
letter-spacing:4px;
font-size:.8rem;
opacity:.6;
margin-bottom:15px;
}

.nowPlaying{
font-size:1.8rem;
font-weight:bold;
margin-bottom:15px;
}

.sub{
opacity:.7;
margin-bottom:30px;
}

.countdown{
font-size:2rem;
color:gold;
margin-bottom:25px;
}

.btn{
padding:12px 26px;
border:none;
border-radius:999px;
cursor:pointer;
font-weight:bold;
background:white;
color:black;
transition:.2s;
}

.btn:hover{transform:scale(1.05);}

.footer{
margin-top:25px;
font-size:.75rem;
opacity:.4;
letter-spacing:2px;
}

/* FADE OVERLAY */
.fadeOverlay{
position:fixed;
inset:0;
background:black;
opacity:0;
pointer-events:none;
z-index:999;
transition:opacity 1.2s ease;
}
.fadeOverlay.active{
opacity:1;
}

</style>
</head>

<body>
<div class="fadeOverlay" id="fadeOverlay"></div>

<div class="glow"></div>
<div id="particles"></div>

<div class="container">
<img src="assets/logo.png" class="logo">

<div class="label">NOW BROADCASTING</div>

<div class="nowPlaying" id="nowPlaying">Loading...</div>

<div class="sub">Entering KathReid TV experience</div>

<div class="countdown" id="countdown">10</div>

<button class="btn" onclick="enter()">ENTER CHANNEL</button>

<div class="footer">KATHREID TV • 24/7 STREAM</div>
</div>

<script>

const url = "https://krcwofc.github.io/kathreid-tv/";

const overlay = document.getElementById("fadeOverlay");

function enter(){
overlay.classList.add("active");
setTimeout(()=>{
window.location.href = url;
}, 1200);
}

async function load(){
try{
const res = await fetch("./data/state.json?t=" + Date.now());
const data = await res.json();
document.getElementById("nowPlaying").textContent =
data.slot?.label || "Live Broadcast";
}catch(e){
document.getElementById("nowPlaying").textContent = "Live Broadcast";
}
}

load();

/* countdown */
let t = 10;
const cd = document.getElementById("countdown");

const timer = setInterval(()=>{
t--;
cd.textContent = t;
if(t <= 0){
clearInterval(timer);
enter();
}
},1000);

/* particles */
const pWrap = document.getElementById("particles");

for(let i=0;i<60;i++){
const p = document.createElement("div");
p.className = "particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (8+Math.random()*10) + "s";
p.style.animationDelay = Math.random()*5 + "s";
pWrap.appendChild(p);
}

</script>

</body>
</html>
