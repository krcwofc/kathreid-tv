<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KathReid TV Lobby</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* =======================
   BACKGROUND GLOW
======================= */
.glow{
  position:fixed;
  width:900px;
  height:900px;
  background:radial-gradient(circle, rgba(255,215,0,.18), transparent 60%);
  filter:blur(70px);
  z-index:0;
}

/* =======================
   PARTICLES
======================= */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:.4;
  border-radius:50%;
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(110vh);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}

/* =======================
   LAYOUT
======================= */
.container{
  position:relative;
  z-index:2;
  max-width:800px;
  padding:40px;
}

/* =======================
   BRAND
======================= */
.brand{
  font-size:3.2rem;
  letter-spacing:10px;
  font-weight:900;
  margin-bottom:10px;
  display:inline-block;

  color:transparent;
  background:linear-gradient(90deg,#b8860b,#fff,#ffd700,#fff,#b8860b);
  background-size:300% 100%;
  -webkit-background-clip:text;
  background-clip:text;

  animation:sheen 4s linear infinite;
  text-shadow:0 0 25px rgba(255,215,0,.25);
}

@keyframes sheen{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

/* =======================
   LOGO (CORE FIX)
======================= */
.logo{
  width:200px;
  height:auto;
  margin:0 auto 25px auto;
  display:block;

  transform-origin:center;
  will-change:transform, filter;

  /* smooth breathing */
  animation:logoPulse 3.2s ease-in-out infinite;

  /* smooth state blending */
  transition:
    transform 900ms cubic-bezier(0.22, 1, 0.36, 1),
    filter 900ms cubic-bezier(0.22, 1, 0.36, 1),
    opacity 900ms cubic-bezier(0.22, 1, 0.36, 1);

  filter:drop-shadow(0 0 14px rgba(255,215,0,.22));
}

/* gentle “alive” pulse */
@keyframes logoPulse{
  0%,100%{
    transform:scale(1);
    filter:drop-shadow(0 0 14px rgba(255,215,0,.20));
  }

  50%{
    transform:scale(1.018);
    filter:drop-shadow(0 0 22px rgba(255,215,0,.30));
  }
}

/* =======================
   LOCK STATE (SMOOTH MOMENT)
   - no harsh jump
   - uses easing + layered glow
======================= */
.logo.locked{
  animation:lockBreath 1.6s ease-in-out infinite;

  transform:scale(1.05);

  filter:
    drop-shadow(0 0 22px rgba(255,215,0,.45))
    drop-shadow(0 0 45px rgba(255,215,0,.25))
    drop-shadow(0 0 70px rgba(255,255,255,.15));

  opacity:1;
}

/* after lock: subtle continued breathing (important for smoothness) */
@keyframes lockBreath{
  0%,100%{
    transform:scale(1.045);
    filter:
      drop-shadow(0 0 25px rgba(255,215,0,.45))
      drop-shadow(0 0 55px rgba(255,255,255,.15));
  }

  50%{
    transform:scale(1.06);
    filter:
      drop-shadow(0 0 35px rgba(255,215,0,.55))
      drop-shadow(0 0 75px rgba(255,255,255,.20));
  }
}

/* =======================
   TEXT
======================= */
.label{
  letter-spacing:4px;
  font-size:.8rem;
  opacity:.6;
  margin-bottom:15px;
}

.nowPlaying{
  font-size:1.8rem;
  font-weight:bold;
  margin-bottom:15px;
}

.sub{
  opacity:.7;
  margin-bottom:30px;
}

.footer{
  margin-top:25px;
  font-size:.75rem;
  opacity:.4;
  letter-spacing:2px;
}

/* =======================
   BUTTON
======================= */
.btn{
  padding:12px 26px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
  background:white;
  color:black;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* =======================
   FADE OVERLAY
======================= */
.fadeOverlay{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:opacity 1.2s ease;
}

.fadeOverlay.active{
  opacity:1;
}

/* =======================
   LOADER
======================= */
.sliderWrap{
  margin:25px auto;
  width:100%;
  max-width:320px;
}

.sliderTrack{
  width:100%;
  height:6px;
  background:rgba(255,255,255,.15);
  border-radius:999px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,215,0,.15);
}

.sliderFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  border-radius:999px;
  position:relative;
  overflow:hidden;
}

.sliderFill::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:60%;
  height:100%;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.8),
    transparent
  );
  animation:shineMove 1.2s infinite;
}

@keyframes shineMove{
  0%{left:-60%;}
  100%{left:120%;}
}
</style>
</head>

<body>
<div class="fadeOverlay" id="fadeOverlay"></div>

<div class="glow"></div>
<div id="particles"></div>

<div class="container">

<div class="brand">KATHREID TV</div>

<img src="assets/logo.png" class="logo">

<div class="label">NOW BROADCASTING</div>

<div class="nowPlaying" id="nowPlaying">Loading...</div>

<div class="sub">Entering broadcast experience</div>

<div class="sliderWrap">
  <div class="sliderTrack">
    <div class="sliderFill" id="sliderFill"></div>
  </div>
</div>
  
<button class="btn" onclick="enter()">ENTER CHANNEL</button>

<div class="footer">24/7 STREAM • GLOBAL SIGNAL</div>

</div>

<script>

const url = "https://krcwofc.github.io/kathreid-tv/";

const overlay = document.getElementById("fadeOverlay");

function enter(){
overlay.classList.add("active");
setTimeout(()=>{
window.location.href = url;
}, 1200);
}

async function load(){
try{
const res = await fetch("./data/state.json?t=" + Date.now());
const data = await res.json();
document.getElementById("nowPlaying").textContent =
data.slot?.label || "Live Broadcast";
}catch(e){
document.getElementById("nowPlaying").textContent = "Live Broadcast";
}
}

load();

/* countdown */
const fill = document.getElementById("sliderFill");
const logo = document.querySelector(".logo");

const duration = 6000;
const start = Date.now();

let lockedIn = false;

function updateLoader(){

let elapsed = Date.now() - start;
let progress = Math.min(elapsed / duration, 1);

fill.style.width = (progress * 100) + "%";

/* 🔒 LOCK-IN AT 80% */
if(progress >= 0.8 && !lockedIn){
lockedIn = true;
logo.classList.add("locked");
}

if(progress >= 1){
enter();
return;
}

requestAnimationFrame(updateLoader);
}

updateLoader();

/* particles */
const pWrap = document.getElementById("particles");

for(let i=0;i<60;i++){
const p = document.createElement("div");
p.className = "particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (8+Math.random()*10) + "s";
p.style.animationDelay = Math.random()*5 + "s";
pWrap.appendChild(p);
}

</script>

</body>
</html>
