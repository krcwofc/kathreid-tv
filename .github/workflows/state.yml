name: Generate TV State

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure bridge file exists
        run: |
          mkdir -p data

          if [ ! -f data/state-bridge.json ]; then
            echo '{"slot":{"start":0,"end":0,"label":"NO BRIDGE"},"movieId":null,"movieTitle":null,"timestamp":0}' > data/state-bridge.json
          fi

      - name: Generate state.json
        run: node scripts/generateState.js

      - name: Commit state files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/state.json data/state-bridge.json

          git diff --cached --quiet && exit 0

          git commit -m "update tv state"

          git pull --rebase origin main

          git push origin main
