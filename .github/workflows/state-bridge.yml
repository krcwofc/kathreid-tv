name: Generate State Bridge

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create data folder
        run: mkdir -p data

      - name: Create state-bridge.json
        run: node scripts/generateBridge.js

      - name: Commit bridge file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/state-bridge.json

          git diff --cached --quiet && exit 0

          git commit -m "update state bridge"

          git pull --rebase origin main

          git push origin main

      - name: Debug files
        run: ls -R
