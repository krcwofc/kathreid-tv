name: Generate State Bridge

on:
  schedule:
    - cron: "* * * * *"   # runs every minute
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create state-bridge.json
        run: node scripts/generateBridge.js

      - name: Commit bridge file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/state-bridge.json
          git commit -m "update state bridge" || echo "No changes"
          git push
