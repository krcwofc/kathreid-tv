<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KATHREID TV - Launch Night</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;
}

.container{
  max-width:800px;
  padding:40px;
}

.logo{
  width:220px;
  max-width:80%;
  margin-bottom:25px;
}

h1{
  font-size:3rem;
  margin-bottom:15px;
  letter-spacing:2px;
}

.subtitle{
  font-size:1.2rem;
  margin-bottom:25px;
  opacity:.9;
}

.message{
  font-size:1rem;
  line-height:1.7;
  opacity:.8;
  margin-bottom:35px;
}

.enter-btn{
  display:inline-block;
  text-decoration:none;
  color:white;

  border:2px solid white;
  padding:16px 40px;
  border-radius:8px;

  font-size:1.1rem;
  font-weight:bold;

  transition:.25s;
}

.enter-btn:hover{
  background:white;
  color:black;
}

.footer{
  margin-top:40px;
  font-size:.85rem;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">

  <!-- Replace with your logo path -->
  <img src="logo.png" class="logo" alt="KathReid TV">

  <h1>KATHREID TV</h1>

  <div class="subtitle">
    OFFICIAL LAUNCH NIGHT
  </div>

  <div class="message">
    Welcome to KathReid TV.<br><br>

    A fan-made 24/7 channel dedicated to
    Kathryn Bernardo & James Reid.<br><br>

    Thank you for being part of launch night.
  </div>

  <!-- Change link if your player is somewhere else -->
  <a href="https://krcwofc.github.io/kathreid-tv/" class="enter-btn">
    ENTER CHANNEL
  </a>

  <div class="footer">
    Streaming 24 Hours A Day
  </div>

</div>

</body>
</html>
