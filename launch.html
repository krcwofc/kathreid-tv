<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KathReid TV Lobby</title>

<style>
/* =======================
   LOGO BASE (SMOOTH LAYERED SYSTEM)
======================= */

.logo{
width:200px;
margin:0 auto 25px auto;
display:block;
transform-origin:center;

/* base glow */
filter:drop-shadow(0 0 14px rgba(255,215,0,.22));

/* IMPORTANT: no competing animation swap */
animation:logoPulse 2.8s ease-in-out infinite;

transition:
transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
filter 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

/* =======================
   SOFT BREATHING PULSE (BASE STATE)
======================= */
@keyframes logoPulse{
0%,100%{
transform:scale(1);
filter:drop-shadow(0 0 14px rgba(255,215,0,.22));
}

50%{
transform:scale(1.02);
filter:drop-shadow(0 0 24px rgba(255,215,0,.35));
}
}

/* =======================
   LOCK STATE (NO KEYFRAME REPLACEMENT)
   → JUST ADD ENERGY ON TOP
======================= */
.logo.locked{
transform:scale(1.04);

/* IMPORTANT: layered glow instead of override burst */
filter:
drop-shadow(0 0 22px rgba(255,215,0,.35))
drop-shadow(0 0 38px rgba(255,215,0,.25))
drop-shadow(0 0 55px rgba(255,255,255,.18));

/* subtle brightness lift instead of “flash” */
opacity:1;
}
</style>
</head>

<body>
<div class="fadeOverlay" id="fadeOverlay"></div>

<div class="glow"></div>
<div id="particles"></div>

<div class="container">

<div class="brand">KATHREID TV</div>

<img src="assets/logo.png" class="logo">

<div class="label">NOW BROADCASTING</div>

<div class="nowPlaying" id="nowPlaying">Loading...</div>

<div class="sub">Entering broadcast experience</div>

<div class="sliderWrap">
  <div class="sliderTrack">
    <div class="sliderFill" id="sliderFill"></div>
  </div>
</div>
  
<button class="btn" onclick="enter()">ENTER CHANNEL</button>

<div class="footer">24/7 STREAM • GLOBAL SIGNAL</div>

</div>

<script>

const url = "https://krcwofc.github.io/kathreid-tv/";

const overlay = document.getElementById("fadeOverlay");

function enter(){
overlay.classList.add("active");
setTimeout(()=>{
window.location.href = url;
}, 1200);
}

async function load(){
try{
const res = await fetch("./data/state.json?t=" + Date.now());
const data = await res.json();
document.getElementById("nowPlaying").textContent =
data.slot?.label || "Live Broadcast";
}catch(e){
document.getElementById("nowPlaying").textContent = "Live Broadcast";
}
}

load();

/* countdown */
const fill = document.getElementById("sliderFill");
const logo = document.querySelector(".logo");

const duration = 6000;
const start = Date.now();

let lockedIn = false;

function updateLoader(){

let elapsed = Date.now() - start;
let progress = Math.min(elapsed / duration, 1);

fill.style.width = (progress * 100) + "%";

/* 🔒 LOCK-IN AT 80% */
if(progress >= 0.8 && !lockedIn){
lockedIn = true;
logo.classList.add("locked");
}

if(progress >= 1){
enter();
return;
}

requestAnimationFrame(updateLoader);
}

updateLoader();

/* particles */
const pWrap = document.getElementById("particles");

for(let i=0;i<60;i++){
const p = document.createElement("div");
p.className = "particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (8+Math.random()*10) + "s";
p.style.animationDelay = Math.random()*5 + "s";
pWrap.appendChild(p);
}

</script>

</body>
</html>
