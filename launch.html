<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KathReid TV - Launch Night</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px);
background-size:60px 60px;
opacity:.15;
animation:drift 60s linear infinite;
}

@keyframes drift{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

.container{
position:relative;
z-index:10;
max-width:900px;
padding:40px;
animation:fadeIn 2s ease;
}

.logo{
font-size:4rem;
font-weight:900;
letter-spacing:5px;
text-shadow:
0 0 10px #fff,
0 0 20px #fff,
0 0 40px #ffd700;
}

.launch{
margin-top:15px;
font-size:1.2rem;
letter-spacing:4px;
color:#ffd700;
}

.names{
margin-top:30px;
font-size:1.5rem;
line-height:2;
}

.message{
margin-top:30px;
opacity:.8;
line-height:1.8;
font-size:1.05rem;
}

.enter-btn{
display:inline-block;
margin-top:40px;
padding:18px 50px;
border:2px solid #ffd700;
color:#ffd700;
text-decoration:none;
font-weight:bold;
letter-spacing:2px;
border-radius:10px;
transition:.3s;
animation:pulse 2s infinite;
}

.enter-btn:hover{
background:#ffd700;
color:black;
}

@keyframes pulse{
0%{box-shadow:0 0 0px #ffd700;}
50%{box-shadow:0 0 30px #ffd700;}
100%{box-shadow:0 0 0px #ffd700;}
}

.live{
position:absolute;
top:25px;
right:25px;
background:red;
padding:10px 18px;
border-radius:30px;
font-size:.9rem;
font-weight:bold;
animation:blink 1.5s infinite;
}

@keyframes blink{
50%{opacity:.4;}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.footer{
margin-top:35px;
opacity:.6;
font-size:.9rem;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="live">
🔴 NOW LIVE
</div>

<div class="container">

<div class="logo">
KATHREID TV
</div>

<div class="launch">
OFFICIAL LAUNCH NIGHT
</div>

<div class="names">
Kathryn Bernardo<br>
&<br>
James Reid
</div>

<div class="message">
Welcome to KathReid TV.<br><br>

A fan-created 24/7 television channel dedicated to
Kathryn Bernardo and James Reid.<br><br>

Thank you for joining us on launch night.
</div>

<a href="https://krcwofc.github.io/kathreid-tv/" class="enter-btn">
📺 ENTER CHANNEL
</a>

<div class="footer">
Broadcasting 24 Hours A Day
</div>

</div>

</body>
</html>
